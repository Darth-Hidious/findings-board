<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Vingilot modular airframe layout">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8eef4"/>
      <stop offset="55%" stop-color="#d5e0ea"/>
      <stop offset="100%" stop-color="#c3d0dc"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#cfd8e3"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#sky)"/>
  <g fill="none" stroke="#1f2a33" stroke-width="2.5" stroke-linejoin="round">
    <!-- wing -->
    <path d="M120 250 C220 210 340 195 480 195 C620 195 740 210 840 250 L800 290 C700 255 580 240 480 240 C380 240 260 255 160 290 Z" fill="url(#metal)"/>
    <!-- fuselage -->
    <ellipse cx="480" cy="275" rx="210" ry="42" fill="#edf2f7" stroke="#1f2a33"/>
    <!-- nacelles -->
    <rect x="250" y="245" width="70" height="58" rx="18" fill="#d9e3ee"/>
    <rect x="640" y="245" width="70" height="58" rx="18" fill="#d9e3ee"/>
    <!-- empennage -->
    <path d="M650 275 L820 230 L820 320 Z" fill="#d2dde8"/>
  </g>
  <g font-family="ui-sans-serif, system-ui, sans-serif" fill="#1f2a33">
    <text x="48" y="64" font-size="28" font-weight="700">Vingilot Mk01</text>
    <text x="48" y="98" font-size="16" fill="#4a5a68">Modular Code-CAD Ę CadQuery Æ STEP Æ Onshape</text>
    <g font-size="14" font-weight="600">
      <text x="250" y="380">Fuselage</text>
      <text x="430" y="170">Wing</text>
      <text x="248" y="340">Nacelle</text>
      <text x="760" y="360">Empennage</text>
    </g>
  </g>
  <g stroke="#1f2a33" stroke-width="1.25" stroke-dasharray="4 4" opacity="0.55">
    <line x1="300" y1="360" x2="380" y2="290"/>
    <line x1="460" y1="180" x2="480" y2="210"/>
    <line x1="285" y1="330" x2="285" y2="305"/>
    <line x1="790" y1="345" x2="780" y2="300"/>
  </g>
</svg>
